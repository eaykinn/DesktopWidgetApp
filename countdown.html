<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .setup-panel { display: flex; flex-direction: column; gap: 15px; width: 100%; }
    .time-inputs { display: flex; gap: 10px; justify-content: center; align-items: center; }
    .time-inputs input {
      width: 50px; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3); color: white; text-align: center; font-size: 16px; font-family: monospace; outline: none;
    }
    .time-inputs span { font-size: 20px; font-weight: bold; color: white; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="widget-window drag-region">
  <div class="widget-container">
    <button id="close-btn" class="close-btn no-drag">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
    <div id="display" class="time-display" style="margin-bottom: 20px;">00:00:00</div>
    
    <div id="setup-panel" class="setup-panel no-drag">
      <div class="time-inputs">
        <input id="input-h" type="number" min="0" max="99" value="0">
        <span>:</span>
        <input id="input-m" type="number" min="0" max="59" value="5">
        <span>:</span>
        <input id="input-s" type="number" min="0" max="59" value="0">
      </div>
      <button id="start-btn" class="action-btn primary" style="width: 100%; padding: 10px;">Start Countdown</button>
    </div>

    <div id="control-panel" class="action-buttons no-drag hidden">
      <button id="stop-btn" class="action-btn" style="background: var(--accent-yellow);">Pause</button>
      <button id="reset-btn" class="action-btn danger">Reset</button>
    </div>
  </div>
  <script src="countdown.js"></script>
</body>
</html>
