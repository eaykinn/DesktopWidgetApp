<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    .search-input {
      width: 100%; padding: 10px 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3); color: white; outline: none; margin-bottom: 15px; box-sizing: border-box;
    }
    .search-results {
      position: absolute; top: 55px; left: 10px; right: 10px; background: rgba(15,23,42,0.95);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); max-height: 150px; overflow-y: auto; z-index: 10;
    }
    .search-results div { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .search-results div:hover { background: rgba(255,255,255,0.1); }
    .forecast-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 5px; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="widget-window drag-region">
  <div class="widget-container" style="padding-top: 30px;">
    <button id="close-btn" class="close-btn no-drag">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>

    <div style="width: 100%; position: relative;" class="no-drag">
      <input type="text" id="city-search" placeholder="Search city..." autocomplete="off" class="search-input">
      <div id="search-results" class="search-results custom-scrollbar hidden"></div>
    </div>

    <div id="weather-content" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center; flex: 1; overflow: hidden;">
      <h2 id="location-name" style="font-size: 20px; font-weight: bold; margin: 0 0 5px 0;">City Name</h2>
      <div id="current-icon-container" style="color: var(--accent-blue); margin-bottom: 5px; display: flex; justify-content: center; width: 60px; height: 60px;"></div>
      <div id="current-temp" class="weather-temp">--°C</div>
      <div id="current-desc" class="weather-desc" style="margin-bottom: 15px;">Loading...</div>

      <div style="flex: 1; width: 100%; overflow-y: auto; padding-right: 5px;" class="custom-scrollbar">
        <div id="forecast-container" style="display: flex; flex-direction: column; width: 100%;"></div>
      </div>
    </div>

    <div id="empty-state" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.6;">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 40px; height: 40px; margin-bottom: 10px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      <p style="text-align: center; font-size: 14px; margin: 0;">Search for a city<br>to see the weather.</p>
    </div>
  </div>
  <script src="weather.js"></script>
</body>
</html>
