<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="widget-window drag-region">
  <div class="widget-container" style="flex-direction: row; gap: 15px; justify-content: flex-start;">
    <button id="close-btn" class="close-btn no-drag">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>

    <!-- Album Art -->
    <div id="thumbnail-container" style="width: 80px; height: 80px; background: rgba(0,0,0,0.4); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; background-size: cover; background-position: center; flex-shrink: 0;">
      <svg id="default-icon" style="width: 40px; height: 40px; color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
    </div>

    <!-- Info & Controls -->
    <div style="flex: 1; display: flex; flex-direction: column; min-width: 0;">
      <div style="margin-bottom: 10px;">
        <h3 id="title" style="margin: 0; font-size: 16px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">No Media</h3>
        <p id="artist" style="margin: 3px 0 0 0; font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Waiting for playback...</p>
      </div>

      <!-- Progress -->
      <div id="progress-container" class="no-drag" style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer;">
        <span id="current-time" style="font-size: 11px; color: var(--text-secondary); width: 35px; text-align: right; font-variant-numeric: tabular-nums;">0:00</span>
        
        <div id="progress-bg-wrapper" style="flex: 1; height: 12px; display: flex; align-items: center; position: relative;">
          <div id="progress-bg" style="width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; overflow: hidden;">
            <div id="progress-bar" style="height: 100%; width: 0%; background: var(--accent-green); border-radius: 2px;"></div>
          </div>
          <div id="progress-thumb" style="position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; left: 0; transform: translateX(-50%); box-shadow: 0 2px 5px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s;"></div>
        </div>

        <span id="total-time" style="font-size: 11px; color: var(--text-secondary); width: 35px; text-align: left; font-variant-numeric: tabular-nums;">0:00</span>
      </div>

      <!-- Controls -->
      <div class="media-controls no-drag" style="margin-top: 0;">
        <button id="btn-prev" class="control-btn" style="background: transparent;">
          <svg style="width: 20px; height: 20px;" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" /></svg>
        </button>

        <button id="btn-playpause" class="control-btn play-pause">
          <svg id="icon-play" style="width: 22px; height: 22px; margin-left: 2px; display: none;" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
          <svg id="icon-pause" style="width: 22px; height: 22px;" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" /></svg>
        </button>

        <button id="btn-next" class="control-btn" style="background: transparent;">
          <svg style="width: 20px; height: 20px;" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" /></svg>
        </button>
      </div>
    </div>
  </div>
  <script src="media.js"></script>
</body>
</html>
