<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="dist/styles.css">
</head>
<body class="bg-transparent h-screen overflow-hidden flex items-center justify-center p-2 drag-region select-none">
  <div class="relative bg-white/20 dark:bg-black/40 backdrop-blur-md rounded-2xl p-6 shadow-2xl border border-white/20 dark:border-white/10 flex flex-col items-center justify-center group w-full h-full">
    <button id="close-btn" class="absolute top-2 right-2 no-drag opacity-0 group-hover:opacity-100 transition-opacity text-gray-500 hover:text-red-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
    <div id="display" class="text-4xl font-mono font-bold text-gray-800 dark:text-white mb-4">00:00:00.00</div>
    <div class="flex gap-3 no-drag">
      <button id="start-btn" class="px-4 py-2 bg-green-500/80 hover:bg-green-500 text-white rounded-lg shadow transition-colors font-semibold">Start</button>
      <button id="stop-btn" class="px-4 py-2 bg-yellow-500/80 hover:bg-yellow-500 text-white rounded-lg shadow transition-colors font-semibold hidden">Stop</button>
      <button id="reset-btn" class="px-4 py-2 bg-red-500/80 hover:bg-red-500 text-white rounded-lg shadow transition-colors font-semibold">Reset</button>
    </div>
  </div>
  <script src="stopwatch.js"></script>
</body>
</html>
