<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="widget-window drag-region">
  <div class="widget-container">
    <button id="close-btn" class="close-btn no-drag">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
    <div id="display" class="time-display" style="font-size: 36px;">00:00:00.00</div>
    <div class="action-buttons no-drag">
      <button id="start-btn" class="action-btn primary">Start</button>
      <button id="stop-btn" class="action-btn" style="display: none; background: var(--accent-yellow);">Stop</button>
      <button id="reset-btn" class="action-btn danger">Reset</button>
    </div>
  </div>
  <script src="stopwatch.js"></script>
</body>
</html>
