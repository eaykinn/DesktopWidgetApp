<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="dist/styles.css">
</head>
<body class="bg-transparent h-screen overflow-hidden flex items-center justify-center p-2 drag-region select-none">
  <div class="relative bg-white/20 dark:bg-black/40 backdrop-blur-md rounded-2xl p-6 shadow-2xl border border-white/20 dark:border-white/10 flex flex-col items-center justify-center group w-full h-full">
    <button id="close-btn" class="absolute top-2 right-2 no-drag opacity-0 group-hover:opacity-100 transition-opacity text-gray-500 hover:text-red-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
    <div id="time" class="text-4xl font-bold text-gray-800 dark:text-white tracking-wider">00:00:00</div>
    <div id="date" class="text-sm text-gray-600 dark:text-gray-300 mt-1 font-medium"></div>
  </div>
  <script src="clock.js"></script>
</body>
</html>
