<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Dashboard</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="dashboard">
  <h1>Widget Dashboard</h1>
  
  <div class="dashboard-grid">
    <button onclick="toggleWidget('clock', 300, 150)" class="widget-card card-clock">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span>Clock</span>
    </button>

    <button onclick="toggleWidget('stopwatch', 350, 200)" class="widget-card card-stopwatch">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span>Stopwatch</span>
    </button>

    <button onclick="toggleWidget('countdown', 350, 250)" class="widget-card card-countdown">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span>Countdown</span>
    </button>

    <button onclick="toggleWidget('media', 360, 150)" class="widget-card card-media">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
      <span>Media</span>
    </button>

    <button onclick="toggleWidget('weather', 300, 450)" class="widget-card card-weather">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
      <span>Weather</span>
    </button>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
